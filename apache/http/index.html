<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DevContainer Web Server</title>
    <script src="script.js" defer></script>
    <style>
        /* A fun CSS animation to make the text shake! */
        .shake {
            animation: shake 0.5s infinite;
            color: orange;
            font-weight: bold;
        }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        
        #doomed-text {
            font-size: 1.5em;
            transition: opacity 0.5s ease-out;
        }
    </style>
</head>
<body>
    <h1>JavaScript HTTP Demo</h1>
    
    <div id="target-area">
        <p id="doomed-text">I am a perfectly normal paragraph. I sure hope nothing bad happens to me today...</p>
    </div>
    
    <button id="attack-btn" onclick="fireKamehameha()" style="padding: 10px; font-size: 1.2em; cursor: pointer;">
        Charge Attack!
    </button>
    <br>
    
    <!-- Empty image tag. The browser won't load anything until JS tells it to! -->
    <img id="goku-gif" style="display: none; max-width: 300px; margin-top: 20px;" alt="Attack Sequence">
</body>
</html>
